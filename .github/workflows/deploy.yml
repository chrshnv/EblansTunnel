name: Release on tag

env:
  RUST_CHANNEL: 1.85

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux artifacts
    runs-on: ubuntu-latest
    container:
      image: adguard/core-libs:2.8
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_CHANNEL }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_CHANNEL }}

      - name: Verify tag matches crate version
        run: |
          version_from_tag="${GITHUB_REF_NAME#v}"
          version_from_cargo="$(sed -n 's/^version = "\(.*\)"$/\1/p' endpoint/Cargo.toml | head -n 1)"
          test -n "${version_from_cargo}"
          test "${version_from_tag}" = "${version_from_cargo}"

      - name: Build and package release artifacts
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          out_dir="${GITHUB_WORKSPACE}/dist"

          mkdir -p "${out_dir}"

          CC=x86_64-linux-musl-gcc \
          CXX=x86_64-linux-musl-g++ \
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-musl-gcc \
          BINDGEN_EXTRA_CLANG_ARGS="--sysroot=/opt/cross/x86_64-linux-musl" \
          cargo build --release --locked --target x86_64-unknown-linux-musl

          CC=aarch64-linux-musl-gcc \
          CXX=aarch64-linux-musl-g++ \
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc \
          BINDGEN_EXTRA_CLANG_ARGS="--sysroot=/opt/cross/aarch64-linux-musl" \
          cargo build --release --locked --target aarch64-unknown-linux-musl

          build_target() {
            local target="$1"
            local archive_suffix="$2"
            local release_dir="${GITHUB_WORKSPACE}/target/${target}/release"

            cd "${release_dir}"

            for bin in trusttunnel_endpoint setup_wizard; do
              llvm-objcopy --only-keep-debug "${bin}" "${bin}.debug"
              llvm-strip "${bin}"
              llvm-objcopy --add-gnu-debuglink="${bin}.debug" "${bin}"
            done

            cp "${GITHUB_WORKSPACE}/LICENSE" .
            cp "${GITHUB_WORKSPACE}/scripts/trusttunnel.service.template" .

            archive_name="trusttunnel-v${version}-${archive_suffix}"
            tar zcf "${out_dir}/${archive_name}.tar.gz" \
              --transform "s,^,${archive_name}/," \
              trusttunnel_endpoint \
              setup_wizard \
              LICENSE \
              trusttunnel.service.template

            debug_archive_name="${archive_name}-dbgsym"
            tar zcf "${out_dir}/${debug_archive_name}.tar.gz" \
              --transform "s,^,${debug_archive_name}/," \
              trusttunnel_endpoint.debug \
              setup_wizard.debug
          }

          build_target "x86_64-unknown-linux-musl" "linux-x86_64"
          build_target "aarch64-unknown-linux-musl" "linux-aarch64"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-linux
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for the list of changes.
          files: dist/*.tar.gz
